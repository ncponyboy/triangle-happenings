name: Scrape Triangle Events

on:
  schedule:
    - cron: '0 6 */2 * *'  # Every 2 days at 6 AM UTC (reduces Geekflare credit usage)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit triangle_happenings.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scraper
        id: scraper
        env:
          GEEKFLARE_API_KEY: ${{ secrets.GEEKFLARE_API_KEY }}
          NPS_API_KEY: ${{ secrets.NPS_API_KEY }}
        run: python scrapers/scraper.py
        continue-on-error: true   # commit whatever data collected before failing

      - name: Commit updated events JSON
        if: always()              # always commit so next run has current counts to compare
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add triangle_happenings.json
          git diff --cached --quiet || git commit -m "chore: update Triangle events $(date -u '+%Y-%m-%d')"
          git push

      - name: Fail job if scrapers broke
        if: steps.scraper.outcome == 'failure'
        run: |
          echo "One or more scrapers regressed to 0 events — see health report above."
          exit 1
